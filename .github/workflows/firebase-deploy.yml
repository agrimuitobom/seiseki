name: Deploy to Firebase

# main にマージ（push）されたら自動でビルド → Firebase にデプロイする。
on:
  push:
    branches: [main]
  # 手動実行も可能にする（Actions タブから Run workflow）
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Vite はビルド時に値を埋め込むため、ここで設定値を渡す。
          # GitHub → Settings → Secrets and variables → Actions に登録しておく。
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Write service account key
        env:
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$SERVICE_ACCOUNT" > "${{ runner.temp }}/service-account.json"

      - name: Deploy (Hosting + Firestore rules)
        # storage はデプロイ対象から除外している。
        # 理由: storage デプロイは firebasestorage.googleapis.com の有効化チェックに
        # serviceusage 権限を要求するが、firebase-adminsdk サービスアカウントには無いため 403 になる。
        # storage ルールは安定しているので、変更時のみ手動で
        #   firebase deploy --only storage
        # を実行する（または GCP IAM で Service Usage Consumer ロールを付与すれば CI でも可能）。
        run: >-
          npx firebase-tools deploy
          --only hosting,firestore:rules
          --project seiseki-2a70c
          --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/service-account.json
